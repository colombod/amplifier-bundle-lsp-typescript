# TypeScript/JavaScript LSP Bundle
# Provides TypeScript and JavaScript language support for code intelligence via LSP.
# The typescript-lsp behavior includes lsp-core which provides the tool-lsp module.

bundle:
  name: lsp-typescript
  version: 0.1.0
  description: TypeScript/JavaScript LSP support via typescript-language-server

# Include only the typescript-lsp behavior - it already includes lsp-core internally
includes:
  - bundle: lsp-typescript:behaviors/typescript-lsp
