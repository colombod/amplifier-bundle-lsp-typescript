bundle:
  name: lsp-typescript
  version: 2.2.0
  description: "DEPRECATED: Consolidated into ts-dev. Update your includes to use amplifier-bundle-ts-dev."

hooks:
  - module: hooks-deprecation
    source: git+https://github.com/microsoft/amplifier-foundation@main#subdirectory=modules/hooks-deprecation
    config:
      bundle_name: lsp-typescript
      replacement: amplifier-bundle-ts-dev
      message: "amplifier-bundle-lsp-typescript has been consolidated into amplifier-bundle-ts-dev"
      migration: |
        Update your includes:
        -   - bundle: git+https://github.com/microsoft/amplifier-bundle-lsp-typescript@main
        +   - bundle: git+https://github.com/microsoft/amplifier-bundle-ts-dev@main
      severity: warning
